name: Sync upstream

on:
  schedule:
    - cron: '15 18 * * *'  # 02:15 北京 (避开 claude-code-mirror 的 02:00)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pin a specific upstream tag (e.g. rust-v0.128.0). Empty = latest.'
        required: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag/version
        id: version
        run: |
          INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
          else
            TAG=$(curl -fsSL --retry 3 \
              "https://api.github.com/repos/openai/codex/releases/latest" \
              | jq -r '.tag_name')
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "could not resolve upstream tag" >&2
            exit 1
          fi
          VERSION="${TAG#rust-v}"
          VERSION="${VERSION#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Upstream → $TAG (version=$VERSION)"

      - name: Check if our release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OURTAG="v${{ steps.version.outputs.version }}"
          if gh release view "$OURTAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run sync.sh (native binaries)
        if: steps.check.outputs.exists == 'false'
        env:
          CHANNEL: ${{ steps.version.outputs.tag }}
          WORK_DIR: ./work
        run: |
          chmod +x sync/sync.sh
          ./sync/sync.sh

      - name: Run sync-npm.sh (npm tarballs)
        # Always run, so retroactively-added npm files get uploaded with --clobber.
        env:
          VERSION: ${{ steps.version.outputs.version }}
          WORK_DIR: ./work
        run: |
          chmod +x sync/sync-npm.sh
          ./sync/sync-npm.sh

      - name: Create release with all artifacts (new version)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.version.outputs.version }}"
          UTAG="${{ steps.version.outputs.tag }}"
          OURTAG="v$V"
          mapfile -t files < <(find ./work/$V -type f)
          gh release create "$OURTAG" \
            --repo "${{ github.repository }}" \
            --title "$OURTAG" \
            --notes "Mirror of [openai/codex@$UTAG](https://github.com/openai/codex/releases/tag/$UTAG) (native + npm) on $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest=true \
            "${files[@]}"

      - name: Upload npm tarballs to existing release (retroactive)
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.version.outputs.version }}"
          OURTAG="v$V"
          npm_dir="./work/$V/npm"
          if [ -d "$npm_dir" ]; then
            mapfile -t files < <(find "$npm_dir" -type f)
            for f in "${files[@]}"; do
              echo "uploading: $f"
              gh release upload "$OURTAG" "$f" --repo "${{ github.repository }}" --clobber
            done
          fi

      - name: Update channel pointer
        run: |
          mkdir -p channels
          echo -n "${{ steps.version.outputs.version }}" > channels/latest.txt

      - name: Commit channel pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add channels/
          if git diff --cached --quiet; then
            echo "channel pointer unchanged"
            exit 0
          fi
          git commit -m "chore: bump latest → ${{ steps.version.outputs.version }}"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Sync failed: $(date -u +%Y-%m-%d)" \
            --body "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "sync-failure" || true
